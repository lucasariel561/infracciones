<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Registros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <script th:src="@{/js/validaciones.js}"></script>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="text-center mb-4">Panel de Alta Rápida</h2>

            <div class="card card-custom p-4">
                <ul class="nav nav-tabs mb-4" id="misPestanas" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-inspector" type="button" role="tab">👮‍♂️ Nuevo Inspector</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-conductor" type="button" role="tab">👤 Nuevo Conductor</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-vehiculo" type="button" role="tab">🚗 Nuevo Vehículo</button>
                    </li>
                </ul>

                <div class="tab-content" id="misPestanasContent">

                    <div class="tab-pane fade show active" id="tab-inspector" role="tabpanel">
                        <form th:action="@{/autoridades/guardar}" th:object="${autoridad}" method="post" onsubmit="return confirmarGuardado()">
                            <div class="row mb-3">
                                <div class="col-6"><label>Nombres</label><input type="text" class="form-control" th:field="*{nombres}" required></div>
                                <div class="col-6"><label>Apellidos</label><input type="text" class="form-control" th:field="*{apellidos}" required></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-4"><label>DNI</label><input type="text" class="form-control" th:field="*{documentoIdentidad}" required></div>
                                <div class="col-4"><label>Nº Placa</label><input type="number" class="form-control" th:field="*{numeroPlaca}" required></div>
                                <div class="col-4"><label>Nº Legajo</label><input type="number" class="form-control" th:field="*{numeroLegajo}" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100">Guardar Inspector</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="tab-conductor" role="tabpanel">
                        <form th:action="@{/conductores/guardar}" th:object="${conductor}" method="post" onsubmit="return confirmarGuardado()">
                            <div class="row mb-3">
                                <div class="col-4"><label>Nombres</label><input type="text" class="form-control" th:field="*{nombres}" required></div>
                                <div class="col-4"><label>Apellidos</label><input type="text" class="form-control" th:field="*{apellidos}" required></div>
                                <div class="col-4"><label>DNI</label><input type="text" class="form-control" th:field="*{documentoIdentidad}" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100">Guardar Conductor</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="tab-vehiculo" role="tabpanel">
                        <form th:action="@{/vehiculos/guardar}" th:object="${vehiculo}" method="post" onsubmit="return confirmarGuardado()">
                            <div class="row mb-3">
                                <div class="col-4"><label>Patente</label><input type="text" class="form-control" th:field="*{patenteDominio}" style="text-transform: uppercase;" required></div>
                                <div class="col-4"><label>Color</label><input type="text" class="form-control" th:field="*{colorVehiculo}" required></div>
                                <div class="col-4"><label>Año</label><input type="number" class="form-control" th:field="*{anioPatentamiento}" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100">Guardar Vehículo</button>
                        </form>
                    </div>

                </div>

                <div class="mt-4 text-center">
                    <a th:href="@{/actas/nueva}" class="btn btn-secondary">Volver a la Nueva Acta</a>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
