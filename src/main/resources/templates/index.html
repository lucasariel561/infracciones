<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Infracciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Sistema Central de Infracciones</h1>

    <div class="card card-custom p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Actas Registradas</h3>
            <a th:href="@{/actas/nueva}" class="btn btn-primary-custom text-white">✚ Crear Nueva Acta</a>
        </div>

        <table class="table table-hover table-custom mt-3">
            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha y Hora</th>
                <th>Conductor</th>
                <th>Vehículo</th>
                <th>Inspector</th>
                <th>Ubicación</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="acta : ${listaActas}">
                <td th:text="${acta.id}"></td>
                <td th:text="${(acta.fechaEmision != null ? #temporals.format(acta.fechaEmision, 'dd/MM/yyyy') : 'Sin fecha') + ' - ' + (acta.horaEmision != null ? acta.horaEmision : '')}"></td>
                <td th:text="${acta.conductor != null ? acta.conductor.nombres + ' ' + acta.conductor.apellidos : 'No asignado'}"></td>
                <td th:text="${acta.vehiculo != null ? acta.vehiculo.patenteDominio : 'No asignado'}"></td>
                <td th:text="${acta.autoridad != null ? acta.autoridad.nombres + ' ' + acta.autoridad.apellidos : 'No asignado'}"></td>
                <td th:text="${acta.ubicacionHecho}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
